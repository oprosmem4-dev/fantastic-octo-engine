version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tgsaas
      POSTGRES_USER: tguser
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  bot:
    build: .
    command: python bot/main_bot.py
    env_file: .env
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app

  worker:
    build: .
    command: python worker/worker.py
    env_file: .env
    depends_on:
      - db
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app

  api:
    build: .
    command: uvicorn api.app:app --host 0.0.0.0 --port 8000
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app

volumes:
  pgdata:
